<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | BusTicket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            padding-bottom: 80px;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area { display: flex; align-items: center; gap: 0.5rem; }
        .logo-icon {
            width: 32px; height: 32px; background: #ff7e00; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; color: white;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 0.5rem 1rem;
            border-top: 1px solid #e2e8f0; z-index: 100;
        }
        .nav-item {
            background: none; border: none; cursor: pointer;
            padding: 0.4rem 0.8rem; border-radius: 12px;
            color: #64748b; font-size: 0.75rem;
        }
        .nav-item.active { color: #ff7e00; background: #fff0e0; }
        .panel { display: none; padding: 1.5rem; max-width: 1280px; margin: 0 auto; }
        .panel.active-panel { display: block; }
        .card {
            background: white; border-radius: 24px; padding: 1.5rem;
            margin-bottom: 1.5rem; border: 1px solid #e2e8f0;
        }
        .add-button {
            background: #ff7e00; color: white; border: none; border-radius: 40px;
            padding: 0.8rem; width: 100%; font-weight: 600; margin-bottom: 1rem;
            cursor: pointer;
        }
        .company-item, .bus-item, .booking-item {
            background: #f8fafc; border-radius: 20px; padding: 1rem;
            margin-bottom: 0.75rem; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
        }
        .delete-btn {
            background: #ef4444; color: white; border: none; border-radius: 40px;
            padding: 0.3rem 0.8rem; font-size: 0.7rem; cursor: pointer;
        }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200;
        }
        .modal-card {
            background: white; border-radius: 32px; padding: 1.5rem; width: 90%; max-width: 400px;
        }
        input, button { font-family: inherit; }
        @media (max-width: 640px) { .header { flex-direction: column; align-items: stretch; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <div class="logo-icon">B</div>
        <span>Admin Panel</span>
    </div>
</div>

<!-- Login Panel -->
<div id="loginPanel" class="panel active-panel">
    <div class="card" style="max-width: 400px; margin: 2rem auto;">
        <h2>Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Email" style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:40px;">
        <input type="password" id="adminPassword" placeholder="Password" style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:40px;">
        <button onclick="adminLogin()" style="background:#ff7e00; border:none; padding:0.8rem; border-radius:40px; color:white; width:100%;">Login</button>
        <p style="margin-top:1rem; font-size:0.8rem;">Use the admin account created in Firebase Console.</p>
    </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashboard" style="display: none;">
    <div class="bottom-nav">
        <button class="nav-item" onclick="switchPanel('home')">Home</button>
        <button class="nav-item" onclick="switchPanel('companies')">Companies</button>
        <button class="nav-item" onclick="switchPanel('buses')">Buses</button>
        <button class="nav-item" onclick="switchPanel('bookings')">Bookings</button>
        <button class="nav-item" onclick="logout()">Logout</button>
    </div>
    <div id="adminHomePanel" class="panel active-panel">
        <div class="card"><h3>Dashboard Overview</h3><div id="statsContainer"></div></div>
    </div>
    <div id="adminCompaniesPanel" class="panel">
        <div class="card">
            <button class="add-button" id="addCompanyBtn">+ Add new company</button>
            <div id="companiesList"></div>
        </div>
    </div>
    <div id="adminBusesPanel" class="panel">
        <div class="card"><h3>All Buses</h3><div id="allBusesList"></div></div>
    </div>
    <div id="adminBookingsPanel" class="panel">
        <div class="card"><h3>All Bookings</h3><div id="allBookingsList"></div></div>
    </div>
</div>

<!-- Add Company Modal -->
<div id="addCompanyModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Add new company</h3>
        <input type="text" id="companyName" placeholder="Company name" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;">
        <input type="email" id="companyEmail" placeholder="Company email (login)" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;">
        <input type="password" id="companyPassword" placeholder="Temporary password" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;">
        <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
            <button onclick="closeCompanyModal()" style="background:#e2e8f0; border:none; padding:0.5rem 1rem; border-radius:40px;">Cancel</button>
            <button onclick="addCompany()" style="background:#ff7e00; border:none; padding:0.5rem 1rem; border-radius:40px; color:white;">Add</button>
        </div>
    </div>
</div>

<script>
    // ========== YOUR FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCwChD7c9qEyMJmqYx-EdPaa-eu553EG3w",
        authDomain: "bus-ticket-live.firebaseapp.com",
        projectId: "bus-ticket-live",
        storageBucket: "bus-ticket-live.firebasestorage.app",
        messagingSenderId: "139084281645",
        appId: "1:139084281645:web:41f0fd868b3bb7ee2c05a4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentAdmin = null;

    async function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const pwd = document.getElementById('adminPassword').value;
        try {
            const cred = await auth.signInWithEmailAndPassword(email, pwd);
            currentAdmin = cred.user;
            // For simplicity, any authenticated user is considered admin.
            // In production, you can restrict by UID or custom claim.
            document.getElementById('loginPanel').classList.remove('active-panel');
            document.getElementById('adminDashboard').style.display = 'block';
            loadStats();
            loadCompanies();
            loadAllBuses();
            loadAllBookings();
            switchPanel('home');
        } catch (err) {
            alert("Login failed: " + err.message);
        }
    }

    async function loadStats() {
        const companiesSnap = await db.collection('companies').get();
        const busesSnap = await db.collection('buses').get();
        const bookingsSnap = await db.collection('bookings').get();
        const totalRevenue = bookingsSnap.docs.reduce((sum, d) => sum + (d.data().total || 0), 0);
        document.getElementById('statsContainer').innerHTML = `
            <div class="stats-grid" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem;">
                <div class="stat-card" style="background:#f8fafc; padding:1rem; border-radius:20px; text-align:center;"><div style="font-size:2rem; font-weight:700;">${companiesSnap.size}</div><div>Companies</div></div>
                <div class="stat-card" style="background:#f8fafc; padding:1rem; border-radius:20px; text-align:center;"><div style="font-size:2rem; font-weight:700;">${busesSnap.size}</div><div>Buses</div></div>
                <div class="stat-card" style="background:#f8fafc; padding:1rem; border-radius:20px; text-align:center;"><div style="font-size:2rem; font-weight:700;">${bookingsSnap.size}</div><div>Bookings</div></div>
                <div class="stat-card" style="background:#f8fafc; padding:1rem; border-radius:20px; text-align:center;"><div style="font-size:2rem; font-weight:700;">$${totalRevenue}</div><div>Revenue</div></div>
            </div>
        `;
    }

    async function loadCompanies() {
        const snap = await db.collection('companies').get();
        const container = document.getElementById('companiesList');
        if (snap.empty) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">No companies yet.</div>';
            return;
        }
        let html = '';
        snap.forEach(doc => {
            const data = doc.data();
            html += `
                <div class="company-item">
                    <div><strong>${escapeHtml(data.name)}</strong> (ID: ${doc.id})<br>Email: ${data.email}</div>
                    <div>
                        <button onclick="toggleSubscription('${doc.id}')" style="background:#ff7e00; border:none; border-radius:40px; padding:0.2rem 0.8rem;">${data.subscriptionPaid ? 'Mark Unpaid' : 'Mark Paid'}</button>
                        <button class="delete-btn" onclick="deleteCompany('${doc.id}')">Delete</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    async function toggleSubscription(companyId) {
        const docRef = db.collection('companies').doc(companyId);
        const doc = await docRef.get();
        await docRef.update({ subscriptionPaid: !doc.data().subscriptionPaid });
        loadCompanies();
    }

    async function deleteCompany(companyId) {
        if (confirm("Delete this company and all its stations, buses, bookings?")) {
            const stationsSnap = await db.collection('stations').where('companyId', '==', companyId).get();
            for (const stationDoc of stationsSnap.docs) {
                const busesSnap = await db.collection('buses').where('stationId', '==', stationDoc.id).get();
                for (const busDoc of busesSnap.docs) {
                    const bookingsSnap = await db.collection('bookings').where('busId', '==', busDoc.id).get();
                    bookingsSnap.forEach(async (bk) => await db.collection('bookings').doc(bk.id).delete());
                    await db.collection('buses').doc(busDoc.id).delete();
                }
                await db.collection('stations').doc(stationDoc.id).delete();
            }
            await db.collection('companies').doc(companyId).delete();
            loadCompanies();
            loadAllBuses();
            loadAllBookings();
            loadStats();
        }
    }

    async function addCompany() {
        const name = document.getElementById('companyName').value.trim();
        const email = document.getElementById('companyEmail').value.trim();
        const password = document.getElementById('companyPassword').value.trim();
        if (!name || !email || !password) { alert("Fill all fields"); return; }
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('companies').doc(userCred.user.uid).set({
                name, email, type: 'main', subscriptionPaid: false, createdAt: new Date().toISOString()
            });
            alert("Company added. They can now log in.");
            closeCompanyModal();
            loadCompanies();
            loadStats();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    async function loadAllBuses() {
        const snap = await db.collection('buses').get();
        const container = document.getElementById('allBusesList');
        if (snap.empty) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">No buses.</div>';
            return;
        }
        let html = '';
        for (const doc of snap.docs) {
            const b = doc.data();
            const stationDoc = await db.collection('stations').doc(b.stationId).get();
            const stationName = stationDoc.exists ? stationDoc.data().name : 'Unknown';
            html += `
                <div class="bus-item">
                    <div><strong>${escapeHtml(b.from)} → ${escapeHtml(b.to)}</strong><br>Station: ${stationName}<br>Seats: ${b.availableSeats}/${b.totalSeats} | Price: $${b.price}</div>
                    <button class="delete-btn" onclick="deleteBus('${doc.id}')">Delete</button>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    async function deleteBus(busId) {
        if (confirm("Delete this bus and all its bookings?")) {
            const bookingsSnap = await db.collection('bookings').where('busId', '==', busId).get();
            bookingsSnap.forEach(async (bk) => await db.collection('bookings').doc(bk.id).delete());
            await db.collection('buses').doc(busId).delete();
            loadAllBuses();
            loadAllBookings();
            loadStats();
        }
    }

    async function loadAllBookings() {
        const snap = await db.collection('bookings').orderBy('createdAt', 'desc').get();
        const container = document.getElementById('allBookingsList');
        if (snap.empty) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">No bookings.</div>';
            return;
        }
        let html = '';
        for (const doc of snap.docs) {
            const b = doc.data();
            const busDoc = await db.collection('buses').doc(b.busId).get();
            const route = busDoc.exists ? `${busDoc.data().from}→${busDoc.data().to}` : '?';
            html += `
                <div class="booking-item">
                    <div><strong>${escapeHtml(b.passengerName)}</strong> (${b.phone})<br>Route: ${route}<br>Seats: ${b.seats} | Code: ${b.code} | Total: $${b.total}</div>
                    <div>${b.presented ? '✅ Presented' : '⏳ Not presented'}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function switchPanel(panel) {
        document.querySelectorAll('#adminDashboard .panel').forEach(p => p.classList.remove('active-panel'));
        if (panel === 'home') document.getElementById('adminHomePanel').classList.add('active-panel');
        if (panel === 'companies') document.getElementById('adminCompaniesPanel').classList.add('active-panel');
        if (panel === 'buses') document.getElementById('adminBusesPanel').classList.add('active-panel');
        if (panel === 'bookings') document.getElementById('adminBookingsPanel').classList.add('active-panel');
    }

    function logout() { auth.signOut(); location.reload(); }

    function openAddCompanyModal() { document.getElementById('addCompanyModal').style.display = 'flex'; }
    function closeCompanyModal() { document.getElementById('addCompanyModal').style.display = 'none'; }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }

    document.getElementById('addCompanyBtn').addEventListener('click', openAddCompanyModal);
</script>
</body>
</html>
