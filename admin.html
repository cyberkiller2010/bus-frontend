<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | BusTicket</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',system-ui;background:#f8fafc;color:#0f172a;padding-bottom:80px;}
        .header{background:white;border-bottom:1px solid #e2e8f0;padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
        .logo-area{display:flex;align-items:center;gap:0.75rem;cursor:pointer;}
        .logo-img{width:36px;height:36px;background:#1877f2;border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;font-weight:bold;}
        .site-title{font-size:1.2rem;font-weight:600;}
        .bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:white;display:flex;justify-content:space-around;padding:0.5rem 1rem;border-top:1px solid #e2e8f0;z-index:100;}
        .nav-item{background:none;border:none;cursor:pointer;padding:0.4rem 0.8rem;border-radius:12px;color:#64748b;font-size:0.8rem;font-weight:500;}
        .nav-item.active{color:#1877f2;background:#e7f3ff;}
        .panel{display:none;padding:1.5rem;max-width:1280px;margin:0 auto;}
        .panel.active-panel{display:block;}
        .card{background:white;border-radius:24px;padding:1.5rem;margin-bottom:1.5rem;border:1px solid #e2e8f0;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;}
        .stat-card{background:#f8fafc;border-radius:20px;padding:1rem;text-align:center;border:1px solid #e2e8f0;cursor:pointer;transition:transform 0.1s;}
        .stat-card:hover{transform:translateY(-2px);background:#e7f3ff;}
        .stat-number{font-size:2rem;font-weight:700;color:#1877f2;}
        .stat-label{font-size:0.85rem;color:#475569;}
        .company-item,.bus-item{background:#f8fafc;border-radius:20px;padding:1rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;}
        .add-button{background:#1877f2;color:white;border:none;border-radius:40px;padding:0.8rem;width:100%;font-weight:600;margin-bottom:1rem;cursor:pointer;}
        .action-btn{background:#1877f2;border:none;border-radius:40px;padding:0.3rem 0.8rem;color:white;cursor:pointer;}
        .delete-btn{background:#ef4444;color:white;border:none;border-radius:40px;padding:0.3rem 0.8rem;cursor:pointer;}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:200;}
        .modal-card{background:white;border-radius:32px;padding:1.5rem;width:90%;max-width:450px;}
        input,button{font-family:inherit;}
        .password-wrapper{position:relative;width:100%;margin-bottom:1rem;}
        .password-wrapper input{width:100%;padding:0.8rem;border-radius:40px;border:1px solid #ccc;padding-right:3rem;}
        .toggle-eye{position:absolute;right:1rem;top:50%;transform:translateY(-50%);cursor:pointer;}
        .error-border{border-color:#ef4444 !important;}
        .loading-bar-container{position:fixed;top:0;left:0;width:100%;height:3px;background:transparent;z-index:10000;pointer-events:none;}
        .loading-bar{width:0%;height:100%;background:#1877f2;transition:width 0.3s ease;}
        .image-upload-options{display:flex;gap:0.5rem;margin:1rem 0;}
        @media (max-width:640px){.stats-grid{grid-template-columns:1fr 1fr;}}
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="loading-bar-container" id="loadingBarContainer" style="display: none;"><div class="loading-bar" id="loadingBar"></div></div>
<div class="header">
    <div class="logo-area" id="logoArea"><div class="logo-img" id="headerLogo">🚌</div><span class="site-title" id="headerTitle">Admin Panel</span></div>
</div>

<!-- Login panel -->
<div id="loginPanel" class="panel active-panel">
    <div class="card" style="max-width:400px; margin:2rem auto;">
        <h2>Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Email" style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:40px;">
        <div class="password-wrapper"><input type="password" id="adminPassword" placeholder="Password"><span class="toggle-eye" onclick="toggleAdminPassword()">👁️</span></div>
        <button onclick="adminLogin()" style="background:#1877f2; border:none; padding:0.8rem; border-radius:40px; color:white; width:100%;">Login</button>
    </div>
</div>

<!-- Admin dashboard -->
<div id="adminDashboard" style="display:none;">
    <div class="bottom-nav">
        <button class="nav-item" data-panel="dashboard">Dashboard</button>
        <button class="nav-item" data-panel="companies">Companies</button>
        <button class="nav-item" data-panel="buses">Buses</button>
        <button class="nav-item" data-panel="settings">Settings</button>
        <button class="nav-item" onclick="logout()">Logout</button>
    </div>
    <div id="dashboardPanel" class="panel active-panel">
        <div class="card"><h3>Overview</h3><div class="stats-grid" id="statsGrid"></div></div>
        <div class="card"><h3>Companies</h3><div id="companiesListDashboard"></div></div>
    </div>
    <div id="companiesPanel" class="panel">
        <div class="card"><button class="add-button" id="addCompanyBtn">+ Add new company</button><div id="companiesFullList"></div></div>
    </div>
    <div id="busesPanel" class="panel">
        <div class="card"><div class="search-bar" style="display:flex; gap:0.5rem; margin-bottom:1rem;"><input type="text" id="busFilter" placeholder="Filter by route or company" style="flex:1; padding:0.6rem; border-radius:40px;"><button onclick="loadAllBusesAdmin()" style="background:#1877f2; border:none; padding:0.6rem 1rem; border-radius:40px;">Search</button></div><div id="allBusesListAdmin"></div></div>
    </div>
    <div id="settingsPanel" class="panel">
        <div class="card"><h3>Brand Settings</h3><div style="margin-bottom:1rem;"><label>Site Logo</label><div class="logo-area" style="margin-top:0.5rem; cursor:pointer;" id="changeLogoBtn"><div class="logo-img" id="settingsLogoPreview">🚌</div><span>Click to change logo</span></div></div><div style="margin-bottom:1rem;"><label>Site Name</label><input type="text" id="siteName" placeholder="Site name" style="width:100%; padding:0.6rem; border-radius:40px;"></div><button onclick="saveBrandSettings()" style="background:#1877f2; border:none; padding:0.6rem; border-radius:40px;">Save Brand</button></div>
        <div class="card"><h3>Account Settings</h3><div style="margin-bottom:1rem;"><label>Email (Username)</label><input type="email" id="adminNewEmail" placeholder="New email" style="width:100%; padding:0.6rem; border-radius:40px;"></div><div style="margin-bottom:1rem;"><label>New Password</label><input type="password" id="adminNewPassword" placeholder="Leave blank to keep current" style="width:100%; padding:0.6rem; border-radius:40px;"></div><div style="margin-bottom:1rem;"><label>Confirm Password</label><input type="password" id="adminConfirmPassword" placeholder="Confirm" style="width:100%; padding:0.6rem; border-radius:40px;"></div><button onclick="updateAdminAccount()" style="background:#1877f2; border:none; padding:0.6rem; border-radius:40px;">Update Account</button></div>
    </div>
</div>

<!-- Add company modal -->
<div id="addCompanyModal" class="modal-overlay"><div class="modal-card"><h3>Add new company</h3><input type="text" id="companyName" placeholder="Company name" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;"><input type="email" id="companyEmail" placeholder="Company email" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;"><input type="password" id="companyPassword" placeholder="Temporary password" style="width:100%; padding:0.6rem; margin-bottom:0.8rem; border-radius:40px;"><div style="display:flex; gap:0.5rem; justify-content:flex-end;"><button onclick="closeCompanyModal()" style="background:#e2e8f0; border:none; padding:0.5rem 1rem; border-radius:40px;">Cancel</button><button onclick="addCompany()" style="background:#1877f2; border:none; padding:0.5rem 1rem; border-radius:40px; color:white;">Add</button></div></div></div>

<!-- Logo change modal -->
<div id="logoModal" class="modal-overlay"><div class="modal-card"><h3>Change Logo</h3><div class="image-upload-options"><button onclick="triggerFileUpload()">📁 Upload from file</button><button onclick="openPinterest()">📌 Download from Pinterest</button></div><input type="text" id="logoUrlInput" placeholder="Or paste image URL" style="width:100%; padding:0.6rem; border-radius:40px; margin-top:0.5rem;"><div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem;"><button onclick="closeLogoModal()" style="background:#e2e8f0; border:none; padding:0.5rem 1rem; border-radius:40px;">Cancel</button><button onclick="applyLogoUrl()" style="background:#1877f2; border:none; padding:0.5rem 1rem; border-radius:40px; color:white;">Apply</button></div></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwChD7c9qEyMJmqYx-EdPaa-eu553EG3w",
        authDomain: "bus-ticket-live.firebaseapp.com",
        projectId: "bus-ticket-live",
        storageBucket: "bus-ticket-live.firebasestorage.app",
        messagingSenderId: "139084281645",
        appId: "1:139084281645:web:41f0fd868b3bb7ee2c05a4"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentAdmin = null;
    let companyFilter = 'all';
    let tempLogoUrl = '';

    function showLoadingBar() {
        const container = document.getElementById('loadingBarContainer');
        const bar = document.getElementById('loadingBar');
        container.style.display = 'block';
        bar.style.width = '0%';
        setTimeout(() => { bar.style.width = '70%'; }, 10);
    }
    function hideLoadingBar() {
        const bar = document.getElementById('loadingBar');
        bar.style.width = '100%';
        setTimeout(() => {
            document.getElementById('loadingBarContainer').style.display = 'none';
            bar.style.width = '0%';
        }, 300);
    }
    function toggleAdminPassword() {
        const f = document.getElementById('adminPassword');
        f.type = f.type === 'password' ? 'text' : 'password';
    }

    async function adminLogin() {
        const email = document.getElementById('adminEmail').value;
        const pwd = document.getElementById('adminPassword').value;
        const emailInput = document.getElementById('adminEmail');
        const pwdInput = document.getElementById('adminPassword');
        try {
            const cred = await auth.signInWithEmailAndPassword(email, pwd);
            currentAdmin = cred.user;
            document.getElementById('loginPanel').classList.remove('active-panel');
            document.getElementById('adminDashboard').style.display = 'block';
            await loadDashboardStats();
            await loadCompanies('all');
            await loadBrandSettings();
            switchPanel('dashboard');
        } catch (err) {
            emailInput.classList.add('error-border');
            pwdInput.classList.add('error-border');
            setTimeout(() => {
                emailInput.classList.remove('error-border');
                pwdInput.classList.remove('error-border');
            }, 2000);
        }
    }

    async function loadDashboardStats() {
        const companiesSnap = await db.collection('companies').get();
        const total = companiesSnap.size;
        let paid = 0, unpaid = 0;
        companiesSnap.forEach(doc => { if (doc.data().subscriptionPaid) paid++; else unpaid++; });
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card" onclick="filterCompanies('all')"><div class="stat-number">${total}</div><div class="stat-label">Total Companies</div></div>
            <div class="stat-card" onclick="filterCompanies('paid')"><div class="stat-number">${paid}</div><div class="stat-label">Paid</div></div>
            <div class="stat-card" onclick="filterCompanies('unpaid')"><div class="stat-number">${unpaid}</div><div class="stat-label">Unpaid</div></div>
        `;
    }

    async function filterCompanies(type) {
        companyFilter = type;
        await loadCompanies(type);
        if (document.getElementById('dashboardPanel').classList.contains('active-panel')) await loadCompanies(type);
    }

    async function loadCompanies(filterType) {
        showLoadingBar();
        const snapshot = await db.collection('companies').get();
        let companies = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (filterType === 'paid') companies = companies.filter(c => c.subscriptionPaid);
        else if (filterType === 'unpaid') companies = companies.filter(c => !c.subscriptionPaid);
        const renderList = (compList) => compList.length ? compList.map(c => `
            <div class="company-item"><div><strong>${escapeHtml(c.name)}</strong> (${c.email})</div><div><button class="action-btn" onclick="toggleSubscription('${c.id}', ${!c.subscriptionPaid})">${c.subscriptionPaid ? 'Mark Unpaid' : 'Mark Paid'}</button><button class="delete-btn" onclick="deleteCompany('${c.id}')">Delete</button></div></div>
        `).join('') : '<div>No companies found.</div>';
        document.getElementById('companiesListDashboard').innerHTML = renderList(companies);
        document.getElementById('companiesFullList').innerHTML = renderList(companies);
        hideLoadingBar();
    }

    async function toggleSubscription(companyId, newStatus) {
        showLoadingBar();
        await db.collection('companies').doc(companyId).update({ subscriptionPaid: newStatus });
        await loadCompanies(companyFilter);
        await loadDashboardStats();
        hideLoadingBar();
    }

    async function deleteCompany(companyId) {
        if (confirm("Delete this company and all its stations, buses, bookings?")) {
            showLoadingBar();
            const stationsSnap = await db.collection('stations').where('companyId', '==', companyId).get();
            for (const stationDoc of stationsSnap.docs) {
                const busesSnap = await db.collection('buses').where('stationId', '==', stationDoc.id).get();
                for (const busDoc of busesSnap.docs) {
                    const bookingsSnap = await db.collection('bookings').where('busId', '==', busDoc.id).get();
                    for (const bk of bookingsSnap.docs) await db.collection('bookings').doc(bk.id).delete();
                    await db.collection('buses').doc(busDoc.id).delete();
                }
                await db.collection('stations').doc(stationDoc.id).delete();
            }
            await db.collection('companies').doc(companyId).delete();
            await loadCompanies(companyFilter);
            await loadDashboardStats();
            hideLoadingBar();
        }
    }

    async function addCompany() {
        const name = document.getElementById('companyName').value.trim();
        const email = document.getElementById('companyEmail').value.trim();
        const password = document.getElementById('companyPassword').value.trim();
        if (!name || !email || !password) { alert("Fill all fields"); return; }
        showLoadingBar();
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection('companies').doc(userCred.user.uid).set({
                name, email, type: 'main', subscriptionPaid: false, createdAt: new Date().toISOString()
            });
            closeCompanyModal();
            await loadCompanies(companyFilter);
            await loadDashboardStats();
        } catch (err) { alert("Error: "+err.message); }
        hideLoadingBar();
    }

    async function loadAllBusesAdmin() {
        showLoadingBar();
        const filter = document.getElementById('busFilter').value.toLowerCase();
        const snapshot = await db.collection('buses').get();
        let buses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if (filter) buses = buses.filter(b => (b.from+'→'+b.to).toLowerCase().includes(filter) || (b.company || '').toLowerCase().includes(filter));
        const container = document.getElementById('allBusesListAdmin');
        if (buses.length === 0) container.innerHTML = '<div>No buses found.</div>';
        else {
            let html = '';
            for (const b of buses) {
                const stationDoc = await db.collection('stations').doc(b.stationId).get();
                const stationName = stationDoc.exists ? stationDoc.data().name : 'Unknown';
                html += `<div class="bus-item"><div><strong>${b.from} → ${b.to}</strong><br>Station: ${stationName}<br>Seats: ${b.availableSeats}/${b.totalSeats} | Price: $${b.price}</div><button class="delete-btn" onclick="deleteBusAdmin('${b.id}')">Delete</button></div>`;
            }
            container.innerHTML = html;
        }
        hideLoadingBar();
    }

    async function deleteBusAdmin(busId) {
        if (confirm("Delete this bus and all its bookings?")) {
            showLoadingBar();
            const bookingsSnap = await db.collection('bookings').where('busId', '==', busId).get();
            for (const bk of bookingsSnap.docs) await db.collection('bookings').doc(bk.id).delete();
            await db.collection('buses').doc(busId).delete();
            await loadAllBusesAdmin();
            hideLoadingBar();
        }
    }

    // Brand settings
    async function loadBrandSettings() {
        const doc = await db.collection('settings').doc('brand').get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('siteName').value = data.name || 'Admin Panel';
            const logo = data.logo || '🚌';
            updateHeaderLogo(logo);
            document.getElementById('settingsLogoPreview').innerHTML = logo.startsWith('http') ? `<img src="${logo}" style="width:36px; height:36px; border-radius:10px;">` : logo;
        } else {
            document.getElementById('siteName').value = 'Admin Panel';
            updateHeaderLogo('🚌');
            document.getElementById('settingsLogoPreview').innerHTML = '🚌';
        }
    }
    function updateHeaderLogo(logo) {
        const headerLogo = document.getElementById('headerLogo');
        if (logo.startsWith('http')) {
            headerLogo.style.backgroundImage = `url('${logo}')`;
            headerLogo.style.backgroundSize = 'cover';
            headerLogo.innerText = '';
        } else {
            headerLogo.style.backgroundImage = '';
            headerLogo.innerText = logo;
        }
    }
    async function saveBrandSettings() {
        const name = document.getElementById('siteName').value.trim() || 'Admin Panel';
        const logo = tempLogoUrl || (document.getElementById('settingsLogoPreview').innerText === '🚌' ? '🚌' : tempLogoUrl);
        await db.collection('settings').doc('brand').set({ name, logo });
        document.getElementById('headerTitle').innerText = name;
        updateHeaderLogo(logo);
        alert('Brand settings saved.');
    }
    function openLogoModal() { document.getElementById('logoModal').style.display = 'flex'; document.getElementById('logoUrlInput').value = ''; tempLogoUrl = ''; }
    function closeLogoModal() { document.getElementById('logoModal').style.display = 'none'; }
    function triggerFileUpload() {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    tempLogoUrl = ev.target.result;
                    document.getElementById('settingsLogoPreview').innerHTML = `<img src="${tempLogoUrl}" style="width:36px; height:36px; border-radius:10px;">`;
                    closeLogoModal();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    function openPinterest() { window.open('https://www.pinterest.com/search/pins/?q=bus%20company%20logo', '_blank'); alert("Find an image, copy its URL, then paste it below."); }
    function applyLogoUrl() {
        const url = document.getElementById('logoUrlInput').value.trim();
        if (url) {
            tempLogoUrl = url;
            document.getElementById('settingsLogoPreview').innerHTML = `<img src="${url}" style="width:36px; height:36px; border-radius:10px;">`;
            closeLogoModal();
        }
    }

    async function updateAdminAccount() {
        const newEmail = document.getElementById('adminNewEmail').value.trim();
        const newPwd = document.getElementById('adminNewPassword').value.trim();
        const confirm = document.getElementById('adminConfirmPassword').value.trim();
        if (newPwd && newPwd !== confirm) { alert("Passwords do not match"); return; }
        showLoadingBar();
        try {
            if (newEmail) await currentAdmin.updateEmail(newEmail);
            if (newPwd) await currentAdmin.updatePassword(newPwd);
            alert("Account updated. You may need to log in again.");
            if (newEmail) { await auth.signOut(); location.reload(); }
        } catch (err) { alert("Error: "+err.message); }
        hideLoadingBar();
    }

    function switchPanel(panelId) {
        showLoadingBar();
        document.querySelectorAll('#adminDashboard .panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(`${panelId}Panel`).classList.add('active-panel');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.nav-item[data-panel="${panelId}"]`).classList.add('active');
        if (panelId === 'dashboard') { loadDashboardStats(); loadCompanies(companyFilter); }
        else if (panelId === 'companies') loadCompanies(companyFilter);
        else if (panelId === 'buses') loadAllBusesAdmin();
        else if (panelId === 'settings') loadBrandSettings();
        hideLoadingBar();
    }
    function logout() { auth.signOut(); location.reload(); }
    function openAddCompanyModal() { document.getElementById('addCompanyModal').style.display = 'flex'; }
    function closeCompanyModal() { document.getElementById('addCompanyModal').style.display = 'none'; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }

    document.getElementById('addCompanyBtn').addEventListener('click', openAddCompanyModal);
    document.getElementById('logoArea').addEventListener('click', openLogoModal);
    document.getElementById('changeLogoBtn').addEventListener('click', openLogoModal);
    document.getElementById('busFilter').addEventListener('input', loadAllBusesAdmin);
    document.querySelectorAll('.nav-item').forEach(btn => { const p = btn.getAttribute('data-panel'); if (p) btn.addEventListener('click', () => switchPanel(p)); });
</script>
</body>
</html>
